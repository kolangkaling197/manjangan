name: Vision Plus Scraper

on:
  workflow_dispatch: 
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install DrissionPage

    - name: Install Chrome
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    - name: Run Scraper
      run: |
        mkdir -p debug_json
        python jhk1k213.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # 1. Tambahkan SEMUA file .json di folder debug_json
        # Gunakan wildcard * agar paket_1, paket_6, paket_51 semuanya kena
        git add debug_json/*.json
        
        # 2. Cek apakah ada file yang masuk ke area 'staged' (siap commit)
        if ! git diff --cached --quiet; then
          git commit -m "Update All Vision+ Packets: $(date)"
          git push
        else
          echo "Tidak ada perubahan data baru pada paket-paket JSON."
        fi

    - name: Upload Artifacts (Optional)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: 1799-data
        path: debug_json/
