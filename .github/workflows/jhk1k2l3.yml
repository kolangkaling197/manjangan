name: Vision Plus Scraper

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install DrissionPage

    - name: Install Chrome
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    - name: Run Scraper
      run: |
        mkdir -p debug_json
        python jhk1k213.py

    - name: Upload Artifacts (JSON selalu tersimpan di sini)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: 1799-data
        path: debug_json/

    # ←←← Commit & Push dihapus karena sudah pakai .gitignore
    # Repo tetap bersih, tidak ada lagi conflict selamanya!
