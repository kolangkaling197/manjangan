name: Vision Plus Scraper Auto-Save

on:
  workflow_dispatch: # Agar bisa dijalankan manual
  schedule:
    - cron: '0 * * * *' # Opsional: Berjalan otomatis setiap jam

jobs:
  build:
    runs-on: ubuntu-latest
    # Memberi izin GitHub Actions untuk menulis/mengunggah file ke repo
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install DrissionPage

    - name: Install Chrome
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    - name: Run Scraper
      run: python jhk1k2l3.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add debug_json/*.json
        # Hanya commit jika ada file baru agar tidak error
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update data JSON: $(date)" && git push)
