name: Vision Plus Scraper - Clean Strips

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install DrissionPage

    - name: Install Chrome
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    - name: Run Scraper (ambil clean_strip_*.json)
      run: |
        mkdir -p debug_json_clean
        python jhk1k213.py

    - name: Commit & Push Clean Strip Files
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        git add debug_json_clean/clean_strip_*.json
        
        if ! git diff --cached --quiet; then
          git commit -m "Update Clean Strip Files: $(date)"
          git pull --rebase --autostash origin main
          git push origin main
          echo "✅ Berhasil update clean_strip files"
        else
          echo "Tidak ada perubahan data baru."
        fi

    - name: Upload Artifacts (bonus)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: clean-strips-data
        path: debug_json_clean/
